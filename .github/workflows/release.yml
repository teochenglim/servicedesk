name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

env:
  GO_VERSION: '1.26'

jobs:
  # ── gate: tests must pass before anything ships ────────────────────────────

  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go vet ./...
      - run: go test ./...

  # ── binary matrix ───────────────────────────────────────────────────────────
  #
  # CGO_ENABLED=0 throughout: the sqlite driver (glebarez/go-sqlite ->
  # modernc.org/sqlite) is pure Go, so every OS/arch combination is a plain
  # cross-compile with no C toolchain needed.
  # Artifact per matrix cell: servicedesk-<tag>-<goos>-<goarch>.tar.gz (.zip on windows)

  build:
    name: Build — ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          VERSION: ${{ github.ref_name }}
        run: |
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"
          mkdir -p dist/build
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" \
            -o dist/build/servicedesk${EXT} ./cmd/servicedesk

      - name: Package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          if [ "$GOOS" = "windows" ]; then
            ARCHIVE="servicedesk-${VERSION}-${GOOS}-${GOARCH}.zip"
            (cd dist/build && zip -r "../../${ARCHIVE}" .)
          else
            ARCHIVE="servicedesk-${VERSION}-${GOOS}-${GOARCH}.tar.gz"
            tar -czf "${ARCHIVE}" -C dist/build .
          fi
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ARCHIVE }}
          retention-days: 1

  # ── GitHub Release: collect all archives, attach to release ────────────────

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: true
          path: dist/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
