# Copy to config.yaml and pass --config config.yaml (or set
# SERVICEDESK_CONFIG_FILE=config.yaml) to start the binary from a file
# instead of environment variables. Any SERVICEDESK_* env var still
# overrides the matching value below, so this is safe to check into a
# repo/ConfigMap and override per-environment with a handful of env vars.

addr: ":8080"
log_level: info          # fatal | error | warning | info | debug
static_users: ""          # SERVICEDESK_STATIC_USERS format: "alice:pass:SystemAdmin,bob:pass:Engineer"
ldap_enabled: false

db:
  driver: sqlite           # sqlite | mysql | postgres
  dsn: "file:servicedesk.db?_pragma=busy_timeout(5000)&_pragma=journal_mode(WAL)&_pragma=foreign_keys(ON)"
  # mysql example:   dsn: "servicedesk:servicedesk@tcp(mysql:3306)/servicedesk?parseTime=true"
  # postgres example: dsn: "postgres://servicedesk:servicedesk@postgres:5432/servicedesk?sslmode=disable"

jwt:
  secret: "dev-insecure-secret-change-me"
  issuer: servicedesk

smtp:
  host: ""
  port: 587
  from: servicedesk@example.com
  user: ""
  pass: ""

worker:
  pool_size: 4
  poll_ms: 500

# Demo mode (see RELEASE/v_1.0.8.md) - none of this is required; DEMO_MODE=true
# or -demo work standalone with no config file at all.
demo_mode: false
demo_reset: false

# Per-file upload cap for attachments (DESIGN/08 §8.7) - stored as a DB blob
# column for now, not local disk or an object store.
attachment_max_size_bytes: 10485760 # 10MB

# AI-assisted drafting + AI Ticket Intelligence Panel (DESIGN/08 §8.8-8.9).
# Off by default - enabling it means outbound (or local-network) calls to an
# LLM whenever a draft/summary is requested. base_url/api_key/model all speak
# the OpenAI-compatible /chat/completions format, so the same three fields
# work against a local Ollama (default, no api_key needed), OpenAI, Azure
# OpenAI, or any other self-hosted engine - just change the URL/model.
ai:
  enabled: false
  base_url: "http://localhost:11434/v1" # Ollama's OpenAI-compatible endpoint
  api_key: ""
  model: "qwen3:8b"
