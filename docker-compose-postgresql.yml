# PostgreSQL-backed deployment. Run with:
#   docker compose -f docker-compose-postgresql.yml up --build
name: servicedesk-postgresql

services:
  app:
    build: .
    image: servicedesk:local
    ports:
      - "8080:8080"
    environment:
      SERVICEDESK_ADDR: ":8080"
      SERVICEDESK_DB_DRIVER: postgres
      SERVICEDESK_DB_DSN: "postgres://servicedesk:servicedesk@postgres:5432/servicedesk?sslmode=disable"
      SERVICEDESK_JWT_SECRET: ${SERVICEDESK_JWT_SECRET:-change-me-in-production}
      GOATFLOW_STATIC_USERS: ${GOATFLOW_STATIC_USERS:-}
      SERVICEDESK_LOG_LEVEL: ${SERVICEDESK_LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: servicedesk
      POSTGRES_USER: servicedesk
      POSTGRES_PASSWORD: servicedesk
    volumes:
      # postgres 18+ images store data at /var/lib/postgresql (not .../data)
      # and manage the versioned subdirectory themselves.
      - servicedesk-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servicedesk -d servicedesk"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  servicedesk-postgres-data:
