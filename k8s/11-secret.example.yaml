# EXAMPLE ONLY - do not apply as-is or commit real secrets to git.
# Copy to 11-secret.yaml, fill in real values, and keep that copy out of
# version control (it's covered by k8s/.gitignore).
apiVersion: v1
kind: Secret
metadata:
  name: servicedesk-secrets
type: Opaque
stringData:
  SERVICEDESK_JWT_SECRET: "change-me-to-a-long-random-string"
  GOATFLOW_STATIC_USERS: "" # e.g. "alice:pass:SystemAdmin,bob:pass:Engineer"
  SERVICEDESK_SMTP_HOST: ""
  SERVICEDESK_SMTP_PORT: "587"
  SERVICEDESK_SMTP_FROM: "servicedesk@example.com"
  SERVICEDESK_SMTP_USER: ""
  SERVICEDESK_SMTP_PASS: ""
