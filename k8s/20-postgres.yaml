# A minimal self-contained Postgres for small/demo deployments. For
# production, point 10-configmap.yaml's SERVICEDESK_DB_DSN at a managed
# Postgres instead and remove this file + postgres-secret.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: servicedesk-postgres
spec:
  serviceName: servicedesk-postgres
  replicas: 1
  selector:
    matchLabels:
      app: servicedesk-postgres
  template:
    metadata:
      labels:
        app: servicedesk-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "servicedesk", "-d", "servicedesk"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: servicedesk-postgres
spec:
  selector:
    app: servicedesk-postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None # headless, matches the StatefulSet
