# Example nginx-ingress config - adjust host/class/TLS for your cluster.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: servicedesk
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: servicedesk.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: servicedesk
                port:
                  number: 80
