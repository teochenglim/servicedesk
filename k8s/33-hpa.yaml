# Horizontal scaling (DESIGN.md 5: "500+ concurrent users per instance").
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: servicedesk
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: servicedesk
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
