{{define "header"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} · ServiceDesk</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <link rel="stylesheet" href="/static/css/highlight-github-dark.min.css">
  <script src="/static/js/htmx.min.js"></script>
  <script src="/static/js/alpine.min.js" defer></script>
  <script src="/static/js/highlight.min.js"></script>
</head>
<body>
  <nav class="topnav">
    <a class="brand" href="/tickets">ServiceDesk</a>
    {{if .User}}
    <a href="/tickets">Tickets</a>
    <a href="/queues">Queues</a>
    <a href="/problems">Problems</a>
    {{if .User.Role.IsAgent}}<a href="/admin">Admin</a>{{end}}
    <span class="spacer"></span>
    <span class="whoami">{{.User.Username}} · {{.User.Role}}</span>
    <form method="post" action="/logout" style="display:inline"><button class="link-btn" type="submit">Log out</button></form>
    {{end}}
  </nav>
  <main id="main" class="container">
{{end}}

{{define "footer"}}
  </main>
  <script src="/static/js/app.js"></script>
</body>
</html>
{{end}}
