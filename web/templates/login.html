{{define "login"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Log in · ServiceDesk</title>
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <main class="container" style="max-width:380px; margin-top:8vh;">
    <div class="card">
      <h1>ServiceDesk</h1>
      {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
      <form class="stacked" method="post" action="/login">
        <label for="org">Organization <span class="muted">(customers only)</span></label>
        <input id="org" type="text" name="org" autofocus placeholder="e.g. Acme Corp">
        <label for="username">Username</label>
        <input id="username" type="text" name="username" required>
        <label for="password">Password</label>
        <input id="password" type="password" name="password" required>
        <div class="actions"><button class="primary" type="submit">Log in</button></div>
      </form>
      <p class="muted">Internal staff (Engineer/Manager/SystemAdmin) can leave Organization blank.</p>
      <p class="muted">Demo: set <code>SERVICEDESK_STATIC_USERS</code> or use the auto-created <code>admin</code> account.</p>
    </div>
    {{if .DemoMode}}
    <div class="card" style="margin-top:1rem;">
      <h3 style="margin-top:0;">Log in as (demo)</h3>
      <div class="actions" style="flex-wrap:wrap;">
        <button type="button" class="secondary" onclick="demoLogin('demo.customer1', 'demo1234', 'Acme Corp')">Customer</button>
        <button type="button" class="secondary" onclick="demoLogin('demo.engineer1', 'demo1234', '')">Engineer</button>
        <button type="button" class="secondary" onclick="demoLogin('demo.admin', 'demo1234', '')">Manager</button>
        <button type="button" class="secondary" onclick="demoLogin('admin', 'admin123', '')">SystemAdmin</button>
      </div>
    </div>
    <script>
      function demoLogin(username, password, org) {
        document.getElementById('org').value = org;
        document.getElementById('username').value = username;
        document.getElementById('password').value = password;
        document.querySelector('form[action="/login"]').submit();
      }
    </script>
    {{end}}
  </main>
</body>
</html>
{{end}}
