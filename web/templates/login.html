{{define "login"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Log in · ServiceDesk</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <main class="container" style="max-width:380px; margin-top:8vh;">
    <div class="card">
      <h1>ServiceDesk</h1>
      {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
      <form class="stacked" method="post" action="/login">
        <label for="org">Organization <span class="muted">(customers only)</span></label>
        <input id="org" type="text" name="org" autofocus placeholder="e.g. Acme Corp">
        <label for="username">Username</label>
        <input id="username" type="text" name="username" required>
        <label for="password">Password</label>
        <input id="password" type="password" name="password" required>
        <div class="actions"><button class="primary" type="submit">Log in</button></div>
      </form>
      <p class="muted">Internal staff (Engineer/QueueAdmin/SystemAdmin) can leave Organization blank.</p>
      <p class="muted">Demo: set <code>GOATFLOW_STATIC_USERS</code> or use the auto-created <code>admin</code> account.</p>
    </div>
  </main>
</body>
</html>
{{end}}
