{{define "ticket_new"}}
{{template "header" .}}
<h1>New ticket</h1>
{{if .Error}}<p class="error">{{.Error}}</p>{{end}}
<div class="card">
<form class="stacked" method="post" action="/tickets">
  <label for="category">Category</label>
  <select id="category" name="category" required data-category-templates
          hx-get="/custom-fields/for-category" hx-trigger="change" hx-include="this" hx-target="#custom-fields">
    <option value="" disabled selected>Choose a category&hellip;</option>
    {{range .Categories}}
    <option value="{{.Name}}" data-title="{{.TitleTemplate}}" data-description="{{.DescriptionTemplate}}">{{.Name}}</option>
    {{end}}
  </select>
  <div id="custom-fields"></div>

  <label for="title">Title</label>
  <input id="title" type="text" name="title" required>

  <label for="description">Description</label>
  {{template "markdown_editor" (dict "Name" "description" "Value" "" "ID" "description")}}
  {{if .AIEnabled}}
  <button type="button" class="link-btn" data-ai-url="/tickets/draft-description" data-ai-target="md-editor-description" data-ai-rough="1">&#10024; AI draft from what I have so far</button>
  {{end}}
  <button type="button" class="link-btn" data-kb-match-url="/tickets/match-symptom" data-kb-match-target="kb-match-result">&#128269; Check for existing solution</button>
  <div id="kb-match-result"></div>

  {{if not (eq .User.Role "Customer")}}
  <label for="queue_id">Queue</label>
  <select id="queue_id" name="queue_id" required>
    {{range .Queues}}<option value="{{.ID}}">{{.Name}}</option>{{end}}
  </select>
  {{end}}

  <label for="priority">Priority (blank = queue default)</label>
  <select id="priority" name="priority">
    <option value="">Queue default</option>
    <option>P1</option><option>P2</option><option>P3</option><option>P4</option>
  </select>

  <label for="service_id">Impacted service (optional)</label>
  <select id="service_id" name="service_id">
    <option value="">Unknown</option>
    {{range .Services}}<option value="{{.ID}}">{{.Name}}</option>{{end}}
  </select>

  <label for="watcher_emails">Notify other people about this ticket (optional)</label>
  <input id="watcher_emails" type="text" name="watcher_emails" placeholder="teammate@example.com, another@example.com">

  <div class="actions"><button class="primary" type="submit">Create ticket</button></div>
</form>
</div>
{{template "footer" .}}
{{end}}
